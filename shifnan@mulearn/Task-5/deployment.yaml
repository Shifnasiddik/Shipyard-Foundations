# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-scalable-web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-scalable-web-app
  template:
    metadata:
      labels:
        app: my-scalable-web-app
    spec:
      containers:
        - name: my-scalable-web-app
          image: my-scalable-web-app
          env:
            - name: STUDENT_NAME
              value: "Ayisha"
          ports:
            - containerPort: 80
